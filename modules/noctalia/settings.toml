    rotation = 0.0
    type = "audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = false
        bands = 68.0
        show_when_idle = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 80.0
    box_width = 560.0
    cx = 720.0
    cy = 309.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000003.settings]
        background = false
        color = "primary"
        format = "{:%d %b, %A}"
        shadow = true

[notification]
offset_y = 20
position = "bottom_right"
scale = 1.1000000089406967

[osd]
offset_y = 56
orientation = "horizontal"
position = "bottom_center"
scale = 1.4000000134110451

    [osd.kinds]
    media = false

[plugin_settings."noctalia/notes"]
notes_dir = "~/notes"

[plugin_settings."noctalia/screen_recorder"]
video_source = "focused"

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/wallhaven", "noctalia/timer", "noctalia/translator" ]

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
clipboard_confirm_clear_history = true
clipboard_history_max_entries = 1000
clipboard_image_action_command = "satty --early-exit copy  --copy-command wl-copy -f -"
font_family = "Montserrat Medium"
launch_apps_as_systemd_services = true
offline_mode = false
password_style = "random"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = false

    [shell.launcher]
    app_grid = false
    compact = false
    session_search = true

    [shell.panel]
    borders = false
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_control_center = true
    polkit_placement = "attached"
    shadow = true
    transparency_mode = "soft"

    [shell.screenshot]
    confirm_region = false
    directory = "/home/alex/Pictures/Screenshots"
    pipe_command = "satty --early-exit copy  --copy-command wl-copy -f -"
    pipe_to_command = true
    save_to_file = true

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "l"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "q"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = false
    shortcut = "e"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "r"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "s"
    variant = "destructive"

[theme]
builtin = "Tokyo-Night"
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "qt" ]
    community_ids = [ "papirus-icons" ]

[wallpaper]
directory = "/home/alex/Pictures/Wallpapers"

