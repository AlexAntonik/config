config_version = 2

[bar]
order = [ "default", "workspaces" ]

    [bar.default]
    auto_hide = false
    background_opacity = 0.69999999999999996
    center = [ "taskbar", "clock" ]
    contact_shadow = true
    end = [ "keyboard_layout", "tray", "recorder", "network", "bluetooth", "volume", "battery", "notifications" ]
    font_family = "Montserrat"
    font_weight = 700
    layer = "top"
    margin_ends = 200
    position = "bottom"
    radius = 10
    reserve_space = false
    shadow = true
    show_on_workspace_switch = false
    smart_auto_hide = true
    start = [ "launcher", "temp", "cpu", "ram", "network_rx" ]
    widget_spacing = 8

        [bar.default.dead_zone]
        command = "noctalia msg panel-toggle control-center"
        middle_command = "noctalia msg panel-toggle launcher"
        right_command = "noctalia msg panel-toggle session"

    [bar.workspaces]
    auto_hide = true
    background_opacity = 0.0
    capsule = true
    capsule_fill = "on_primary"
    capsule_opacity = 0.59999998658895493
    capsule_padding = 12.0
    capsule_radius = 12
    capsule_thickness = 0.83999998494982719
    center = [ "workspaces" ]
    contact_shadow = false
    enabled = true
    end = []
    font_family = "Montserrat"
    font_weight = 800
    margin_edge = 4
    margin_ends = 600
    margin_opposite_edge = 3
    position = "top"
    reserve_space = false
    shadow = false
    start = []
    thickness = 38

[control_center]
hidden_tabs = []
sidebar = "compact"
sidebar_section = "compact"

    [control_center.calendar]
    show_events_card = false

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "power_profile"

    [[control_center.shortcuts]]
    type = "mic_mute"

[desktop_widgets]
schema_version = 1
widget_order = [ "desktop-widget-0000000000000002", "desktop-widget-0000000000000001", "desktop-widget-0000000000000003" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 144.0
    box_width = 256.0
    cx = 720.0
    cy = 661.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        color = "primary"
        format = "{:%H:%M}"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 192.0
    box_width = 1440.0
    cx = 720.0
    cy = 96.0
    flip_y = true
    output = "eDP-1"
    rotation = 0.0
    type = "audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background = false
        bands = 96.0
        centered = false
        color_2 = "primary"
        mirrored = true
        show_when_idle = false

    [desktop_widgets.widget.desktop-widget-0000000000000003]
    box_height = 64.0
    box_width = 480.0
    cx = 727.5
    cy = 735.5
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000003.settings]
        background = false
        color = "primary"
        format = "{: %d %b, %A}"

[dock]
active_monitor_only = true
auto_hide = true
enabled = false
launcher_position = "start"
position = "bottom"

[idle]
behavior_order = [ "lock", "screen-off" ]

    [idle.behavior.idle-behavior]
    action = "screen_off"
    enabled = true
    timeout = 900

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

[location]
auto_locate = true

[lockscreen]
blur_intensity = 0.0
blurred_desktop = false
tint_intensity = 0.0

[lockscreen_widgets]
enabled = true
schema_version = 1
widget_order = [
    "lockscreen-login-box@eDP-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002",
    "lockscreen-widget-0000000000000003"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 64.0
    box_width = 400.0
    cx = 720.0
    cy = 677.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

