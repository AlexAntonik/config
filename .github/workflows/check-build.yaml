name: Check Configurations

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  get-hosts:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.list.outputs.hosts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: List hosts
        id: list
        run: |
          if [ ! -d "hosts" ]; then
            echo "::error::hosts directory not found"
            exit 1
          fi
          hosts=$(ls hosts/ | sort | jq -R . | jq -sc .)
          echo "hosts=$hosts" >> $GITHUB_OUTPUT

  build:
    needs: get-hosts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.get-hosts.outputs.hosts) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v24

      - name: Build ${{ matrix.host }}
        id: build
        run: |
          echo "========================================="
          echo "Building configuration for ${{ matrix.host }}..."
          echo "========================================="
          if nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" \
            --no-link --no-allow-dirty 2>&1; then
            echo "status=passing" >> $GITHUB_OUTPUT
            echo "✓ ${{ matrix.host }} build succeeded"
          else
            echo "status=failing" >> $GITHUB_OUTPUT
            echo "✗ ${{ matrix.host }} build failed"
          fi

      - name: Save and upload result
        if: always()
        run: |
          mkdir -p results
          # Имя файла = хост, содержимое = статус
          echo "${{ steps.build.outputs.status }}" > "results/${{ matrix.host }}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.host }}
          path: results/${{ matrix.host }}

  update-readme:
    needs: build
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: result-*
          path: results
          merge-multiple: true

      - name: Build badges and check failures
        id: summary
        run: |
          set -euo pipefail

          if [ ! -d results ] || [ -z "$(ls -A results/ 2>/dev/null)" ]; then
            echo "::error::No result files found"
            exit 1
          fi

          fail=0
          success=0
          badges=""

          while IFS= read -r host; do
            status=$(tr -d '[:space:]' < "results/${host}")
            if [ "${status}" = "passing" ]; then
              color="green"
              success=$(( success + 1 ))
            else
              color="red"
              fail=$(( fail + 1 ))
            fi
            badges="${badges}![${host}](https://badgen.net/badge/${host}/${status}/${color}) "
          done < <(ls results/ | sort)

          echo "badges=${badges}"   >> "${GITHUB_OUTPUT}"
          echo "success=${success}" >> "${GITHUB_OUTPUT}"
          echo "fail=${fail}"       >> "${GITHUB_OUTPUT}"
          echo "Total: ${success} succeeded, ${fail} failed"