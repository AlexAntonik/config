name: Dependabot check
on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, edited]

jobs:
  dependabot-check:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      checks: read
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check that only flake.lock changed
        id: file_check
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files: $CHANGED"
          if [ "$CHANGED" != "flake.lock" ]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if unexpected files changed
        if: steps.file_check.outputs.result == 'fail'
        run: exit 1

      - name: Update PR branch if outdated
        if: steps.file_check.outputs.result == 'ok'
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin "${{ github.base_ref }}" "${{ github.head_ref }}"
          BASE_SHA=$(git rev-parse "origin/${{ github.base_ref }}")
          MERGE_BASE=$(git merge-base "origin/${{ github.head_ref }}" "origin/${{ github.base_ref }}")
          if [ "$MERGE_BASE" != "$BASE_SHA" ]; then
            echo "PR is outdated, updating branch..."
            gh pr update-branch "${{ github.event.pull_request.number }}"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR is up to date."
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for check-configs
        if: steps.file_check.outputs.result == 'ok' && steps.update.outputs.updated == 'false'
        id: wait_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "Waiting for check-configs on commit $SHA..."
          for i in $(seq 1 120); do
            CHECK_RUN=$(gh api "/repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '.check_runs[] | select(.name == "Check Configurations / check-results")' 2>/dev/null)
            if [ -n "$CHECK_RUN" ]; then
              STATUS=$(echo "$CHECK_RUN" | jq -r '.status')
              CONCLUSION=$(echo "$CHECK_RUN" | jq -r '.conclusion // ""')
              echo "check-configs: status=$STATUS, conclusion=$CONCLUSION"
              if [ "$STATUS" = "completed" ]; then
                echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            sleep 30
          done
          echo "Timed out waiting for check-configs"
          echo "conclusion=timed_out" >> "$GITHUB_OUTPUT"

      - name: Automerge if check-configs passed
        if: steps.wait_check.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "check-configs passed. Enabling auto-merge..."
          gh pr merge --auto --merge "${{ github.event.pull_request.html_url }}"

      - name: Close PR if check-configs failed
        if: >
          always() &&
          steps.wait_check.outputs.conclusion != '' &&
          steps.wait_check.outputs.conclusion != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "check-configs: ${{ steps.wait_check.outputs.conclusion }}"
          gh pr close "${{ github.event.pull_request.html_url }}" \
            --comment "Automatically closed: check-configs failed (${{ steps.wait_check.outputs.conclusion }})"
          exit 1
