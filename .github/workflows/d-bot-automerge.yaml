name: Auto-merge dependabot pr

on:
  pull_request:
    branches: [main, master]

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    continue-on-error: true
    permissions:
      checks: read
      contents: write
      pull-requests: write

    steps:
      - name: Wait for all checks to pass
        uses: wechuli/allcheckspassed@v2
        with:
          treat_skipped_as_passed: false
          treat_neutral_as_passed: true
          retries: '30'
      
      - name: Close PR if checks failed
        if: steps.checks.outcome == 'failure'
        run: |
          echo "Checks failed, closing PR..."
          gh pr close "$PR_URL" --comment "❌ Auto-closing: one or more checks failed."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Checkout repository
        if: steps.checks.outcome == 'success'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-merge if only flake.lock changed
        if: steps.checks.outcome == 'success'
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files: $CHANGED"

          if [ "$CHANGED" = "flake.lock" ]; then
            echo "Only flake.lock changed, merging..."
            gh pr merge --auto --merge "$PR_URL"
          else
            echo "Skipping: changed files were: $CHANGED"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}